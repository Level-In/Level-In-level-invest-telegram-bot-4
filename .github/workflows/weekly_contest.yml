name: Weekly Contest Message

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Wymuś wysyłkę testową'
        required: false
        default: 'false'

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python weekly_contest.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          FORCE_SEND: ${{ github.event.inputs.force }}
